# 示例配置 - 最小化配置
# 复制为 config.yaml 使用

workspace:
  default: ./workspace
  auto_detect: true

core_files:
  - MEMORY.md
  - IDENTITY.md
  - USER.md
  - TOOLS.md
  - SOUL.md
  - AGENTS.md
  - BOOTSTRAP.md
  - HEARTBEAT.md

backup:
  enabled: true
  retain_days: 7

logging:
  enabled: true
  level: INFO
