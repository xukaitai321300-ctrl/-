# Agent 自我学习技能配置
# 通用配置，适用于任何 Agent 平台

# 工作目录配置
workspace:
  # 自动检测优先级：
  # 1. 命令行参数 --workspace
  # 2. 环境变量 WORKSPACE
  # 3. 当前目录
  # 4. 默认值 ./workspace
  default: ./workspace
  auto_detect: true

# 核心配置文件
core_files:
  - MEMORY.md
  - IDENTITY.md
  - USER.md
  - TOOLS.md
  - SOUL.md
  - AGENTS.md
  - BOOTSTRAP.md
  - HEARTBEAT.md

# 备份配置
backup:
  enabled: true
  directory: .backup
  retain_days: 7
  max_backups: 10

# 日志配置
logging:
  enabled: true
  directory: logs
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file_format: self_learning_%Y%m%d.log

# 安全配置
safety:
  # 删除操作需要确认
  require_confirm_for_delete: true
  # 最大删除数量限制
  max_delete_count: 10
  # 更新后验证文件
  validate_after_update: true
  # 备份完整性校验
  verify_backup: true

# AI 配置
ai:
  # 分析超时时间 (秒)
  timeout: 90
  # 最大对话记录数
  max_conversations: 100
  # 对话内容最大长度
  max_content_length: 500

# 执行历史
history:
  enabled: true
  directory: .history
  retain_days: 30

# 通知配置
notification:
  enabled: false
  on_complete: true
  on_error: true
  channels:
    - telegram
    - dingtalk
