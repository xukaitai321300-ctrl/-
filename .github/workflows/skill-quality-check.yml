name: Skill Quality Check

on:
  push:
    paths:
      - '**.SKILL.md'
      - 'skills/**'
  pull_request:
    paths:
      - '**.SKILL.md'
      - 'skills/**'
  schedule:
    - cron: '0 9 * * 1'  # 每周一 09:00 运行
  workflow_dispatch:  # 允许手动触发

jobs:
  evaluate-skills:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
    
    - name: Run skill quality checker
      run: |
        python .workbuddy/skills/skill-analyzer/scripts/analyzer.py --path .workbuddy/skills/* --output report.json || true
    
    - name: Generate report
      run: |
        python scripts/generate_report.py report.json > report.md || true
    
    - name: Upload report as artifact
      uses: actions/upload-artifact@v3
      with:
        name: skill-quality-report
        path: report.md
    
    - name: Check thresholds
      run: |
        python scripts/check_thresholds.py report.json --min-score 85 --max-low-quality 5 || true
  
  auto-fix-skills:
    runs-on: ubuntu-latest
    needs: evaluate-skills
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
    
    - name: Run auto fix script
      run: |
        python scripts/auto_fix_skills.py || true
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-fix low quality skills" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
